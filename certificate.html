<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Sertifikat</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
text-align:center;
background:#f5f5f5;
}

.certificate{
width:1123px;
height:794px;
margin:auto;
background:white;
border:15px solid gold;
padding:40px;
box-sizing:border-box;
position:relative;
}

h1{
font-size:60px;
color:#003366;
margin-top:30px;
}

.name{
font-size:42px;
font-weight:bold;
color:#0a58ca;
margin-top:40px;
}

.info{
font-size:24px;
margin-top:30px;
}

.score{
font-size:32px;
font-weight:bold;
margin-top:20px;
color:green;
}
</style>

</head>
<body>

<div class="certificate">

<h1>SERTIFIKAT</h1>

<p>Ushbu sertifikat</p>

<div class="name" id="name"></div>

<div class="info">
onlayn test sinovida muvaffaqiyatli ishtirok etib,
90% va undan yuqori natija ko‘rsatganligi uchun berildi.
</div>

<div class="score" id="score"></div>

<br><br><br>

<p>
TERMIZ IQTISODIYOT VA SERVIS UNIVERSITETI
</p>

</div>

<script>

document.getElementById("name").innerHTML =
localStorage.getItem("studentName");

document.getElementById("score").innerHTML =
"Natija: " +
localStorage.getItem("studentPercent") +
"%";

</script>

</body>
</html>
